<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Feature Graphic Generator — 1024×500</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; gap:20px; }
  canvas { box-shadow:0 0 40px rgba(212,168,75,0.3); }
  button { background:#D4A84B; color:#000; border:none; padding:14px 40px; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>
<canvas id="c" width="1024" height="500"></canvas>
<button onclick="download()">⬇ تحميل Feature Graphic (1024×500)</button>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W=1024, H=500;

// Background
const bg = ctx.createLinearGradient(0,0,W,H);
bg.addColorStop(0,'#073D1C');
bg.addColorStop(0.5,'#0D5C2E');
bg.addColorStop(1,'#073D1C');
ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

// Geometric texture
ctx.save(); ctx.globalAlpha=0.05; ctx.strokeStyle='#D4A84B'; ctx.lineWidth=1;
for(let i=-H; i<W+H; i+=30) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i+H,H); ctx.stroke(); }
ctx.restore();

// Gold border
ctx.save(); ctx.strokeStyle='#D4A84B'; ctx.lineWidth=6; ctx.globalAlpha=0.8;
ctx.strokeRect(14,14,W-28,H-28);
ctx.lineWidth=1.5; ctx.globalAlpha=0.3;
ctx.strokeRect(26,26,W-52,H-52);
ctx.restore();

// Left decorative star
drawStar(ctx, 130, H/2, 55);

// Right decorative star
drawStar(ctx, W-130, H/2, 55);

// App title
ctx.save();
ctx.font = "bold 110px 'Amiri', serif";
ctx.fillStyle='#D4A84B';
ctx.textAlign='center'; ctx.textBaseline='middle';
ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=20;
ctx.fillText('القرآن الكريم', W/2, H/2 - 30);
ctx.restore();

// Subtitle
ctx.save();
ctx.font = "38px 'Amiri', serif";
ctx.fillStyle='rgba(255,255,255,0.75)';
ctx.textAlign='center'; ctx.textBaseline='middle';
ctx.fillText('اقرأ المصحف الشريف كاملاً بخط المصحف', W/2, H/2 + 68);
ctx.restore();

// Decorative dots
const gold='#D4A84B';
[W/2-100, W/2-50, W/2, W/2+50, W/2+100].forEach(x=>{
  ctx.fillStyle=gold; ctx.globalAlpha=0.5;
  ctx.beginPath(); ctx.arc(x, H/2+105, 4, 0, Math.PI*2); ctx.fill();
});

function drawStar(ctx,x,y,r) {
  ctx.save(); ctx.translate(x,y); ctx.globalAlpha=0.25;
  ctx.beginPath();
  for(let i=0;i<16;i++){
    const a=(i*Math.PI/8)-Math.PI/2;
    const rad=i%2===0?r:r*0.42;
    const px=Math.cos(a)*rad, py=Math.sin(a)*rad;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.fillStyle='#D4A84B'; ctx.fill(); ctx.restore();
}

function download(){
  const a=document.createElement('a');
  a.download='feature_graphic_1024x500.png';
  a.href=c.toDataURL('image/png'); a.click();
}
</script>
</body>
</html>
